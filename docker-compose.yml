services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cfd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cfd_remote_assist}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfd}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cfd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cfd_remote_assist}
      OIDC_ISSUER: ${OIDC_ISSUER:?Set OIDC_ISSUER}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-cfd-remote-assist}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL}
      PHONEDB_TLS_INSECURE: ${PHONEDB_TLS_INSECURE:-true}
    expose:
      - "3000"

  web:
    build:
      context: ./web
      args:
        VITE_OIDC_AUTHORITY: ${OIDC_ISSUER}
        VITE_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-cfd-remote-assist}
        VITE_API_BASE: ""
        VITE_WS_BASE: ""
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - server
      - web
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
